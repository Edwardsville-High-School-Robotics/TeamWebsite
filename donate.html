<!doctype html>
<html lang="en">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/theme.css" rel="stylesheet" />
    <title>Page Title</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
      }
    </style>
  </head>

  <body class="bg-dark">
    <div id="title-bar">
      <h2 id="title-words">EHS Robotics Team</h2>
    </div>
    <ul
      class="nav nav-pills nav-fill gap-2 p-1 small bg-secondary rounded-5 shadow-sm"
      id="pillNav2"
      role="tablist"
      style="
        --bs-nav-link-color: var(--bs-white);
        --bs-nav-pills-link-active-color: var(--bs-white);
        --bs-nav-pills-link-active-bg: var(--bs-orange);
      "
    >
      <li class="nav-item" role="presentation">
        <a
          class="nav-link rounded-5"
          data-bs-toggle="tab"
          href="index.html"
          type="button"
          role="tab"
          aria-selected="false"
          >Home</a
        >
      </li>
      <li class="nav-item" role="presentation">
        <a
          class="nav-link rounded-5"
          data-bs-toggle="tab"
          href="sponsors.html"
          type="button"
          role="tab"
          aria-selected="false"
          >Sponsors</a
        >
      </li>
      <li class="nav-item" role="presentation">
        <a
          class="nav-link active rounded-5"
          data-bs-toggle="tab"
          type="button"
          role="tab"
          aria-selected="true"
          >Donate</a
        >
      </li>
      <li class="nav-item" role="presentation">
        <a
          class="nav-link rounded-5"
          data-bs-toggle="tab"
          href="awards.html"
          type="button"
          role="tab"
          aria-selected="false"
          >Awards</a
        >
      </li>
      <li class="nav-item" role="presentation">
        <a
          class="nav-link rounded-5"
          data-bs-toggle="tab"
          href="about.html"
          type="button"
          role="tab"
          aria-selected="false"
          >About</a
        >
      </li>
    </ul>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card bg-secondary text-white">
            <div class="card-body">
              <h3 class="card-title text-center mb-4">Support EHS Robotics</h3>
              <p class="card-text text-center mb-4">
                Your donation helps us build amazing robots and compete at the
                highest levels.
              </p>
              <div id="paypal-button-container" class="mb-3"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID"></script>
    <script>
      paypal
        .Buttons({
          createOrder: function (data, actions) {
            return actions.order.create({
              purchase_units: [
                {
                  amount: {
                    value: "10.00",
                  },
                },
              ],
            });
          },
          onApprove: function (data, actions) {
            return actions.order.capture().then(function (orderData) {
              console.log("Order captured:", orderData);
              alert("Thank you for your donation!");
            });
          },
          onError: function (err) {
            console.error("Error:", err);
            alert("An error occurred during the transaction.");
          },
        })
        .render("#paypal-button-container");
    </script>
  </body>
</html>
